    <script>
        function changeButtonText() {
            var button = document.getElementById('submitButton');
            button.innerHTML = '<span class="btn-title">Sending...</span>';
            button.style.backgroundColor = "#f57c00bf";
            button.disabled = true;
            return true; // To proceed with form submission
        }
    </script>

    <script>
        const message = document.getElementById("message");
        const charCount = document.getElementById("charCount");

        message.addEventListener("input", () => {
            charCount.textContent = `${message.value.length} / 300 characters`;
        });
    </script>

    <script>
        // pop cards
        document.addEventListener("DOMContentLoaded", function () {
            const popupMessage = document.getElementById("popup-message");
            const popupOverlay = document.getElementById("popup-overlay");
            const popupHeading = document.getElementById("popup-heading");
            const popupPara = document.getElementById("popup-para");
            const closeBtn = document.getElementById("close-btn");

            // Simulate a condition (replace with actual logic or URL parameters)
            const urlParams = new URLSearchParams(window.location.search);
            const mailStatus = urlParams.get("emailStatus"); // e.g., mailStatus=true or mailStatus=false

            if (popupMessage && popupHeading && popupOverlay) {
                if (mailStatus === "true") {
                    // Mail sent successfully
                    popupHeading.innerText = "MESSAGE SENT SUCCESSFULLY";
                    popupPara.innerText = "Thank you for reaching out! We will get back to you shortly.";
                    popupMessage.style.display = "block";
                    popupOverlay.style.display = "block";
                } else if (mailStatus === "false") {
                    // Mail sending failed
                    popupHeading.innerText = "MESSAGE NOT SENT";
                    popupPara.innerText = "Oops! Something went wrong. Please try again later.";
                    popupMessage.style.display = "block";
                    popupOverlay.style.display = "block";
                }
            }

            // Close the popup when the close button is clicked
            closeBtn.addEventListener("click", function () {
                popupMessage.style.display = "none";
                popupOverlay.style.display = "none";
            });

            // Close the popup when the overlay is clicked
            popupOverlay.addEventListener("click", function () {
                popupMessage.style.display = "none";
                popupOverlay.style.display = "none";
            });

            // Optionally, clear URL parameters after displaying the popup
            const baseUrl = window.location.href.split("?")[0];
            history.replaceState(null, null, baseUrl);
        });
    </script>
